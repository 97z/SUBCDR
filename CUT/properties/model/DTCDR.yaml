#model config
embedding_size: 64
base_model: NeuMF
mlp_hidden_size: [32, 16]
dropout_prob: 0.1
alpha: 0.5

# training settings
train_epochs: ["BOTH:300"]
train_batch_size: 2048
learner: adam
learning_rate: 0.001
train_neg_sample_args:
  distribution: uniform
  sample_num: 1
  alpha: 1.0
eval_step: 1
stopping_step: 20
clip_grad_norm: ~
# clip_grad_norm:  {'max_norm': 5, 'norm_type': 2}
weight_decay: 1e-6
loss_decimal_place: 4
require_pow: False
t_retain_frac: 1
